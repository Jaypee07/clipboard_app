<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ecosystem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .typing-container {
            display: inline-block;
            overflow: hidden; 
            border-right: .15em solid #2563eb; /* The blue blinking cursor */
            white-space: nowrap; 
            margin: 0 auto; 
            letter-spacing: .05em; 
            animation: 
                typing 3.5s steps(40, end),
                blink-caret .75s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #2563eb; }
        }
    </style>
</head>

<!-- Clean white/light gray background -->
<body class="bg-slate-50 text-gray-900 font-sans antialiased p-4 md:p-8">
    <div class="max-w-2xl mx-auto">
        
        <!-- The Moving Text Header (Blue) -->
        <div class="text-center mb-8 mt-4">
            <h1 class="text-3xl md:text-4xl font-extrabold text-blue-600 typing-container">Welcome to your ecosystem.</h1>
        </div>

        <!-- The Input Area (White card, sharp black border) -->
        <div class="bg-white p-6 rounded-xl shadow-lg border-2 border-black mb-10">
            <form method="POST">
    {% csrf_token %}
    <textarea name="clipboard_text" 
              class="w-full bg-slate-50 text-black rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-blue-600 border border-gray-300 mb-4 resize-none transition duration-200" 
              rows="4" 
              placeholder="Paste ideas, tactics, or links here..."></textarea>
    
    <div class="flex items-center mb-4 cursor-pointer">
        <input type="checkbox" id="keep_permanently" name="keep_permanently" class="w-5 h-5 text-blue-600 bg-white border-2 border-black rounded focus:ring-blue-600 cursor-pointer">
        <label for="keep_permanently" class="ml-2 text-sm font-bold text-black cursor-pointer">Keep this snippet permanently</label>
    </div>
    
    <button type="submit" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 transform hover:-translate-y-1 shadow-md border border-black">
        Save to Ecosystem
    </button>
</form>
        </div>

        <!-- The Saved Snippets Section -->
        <div>
            <h2 class="text-lg text-black font-bold mb-4 uppercase tracking-wider">Recent Snippets</h2>
            
            <div class="space-y-4">
                {% for snippet in snippets %}
                    <!-- Individual Snippet Card (White, blue left accent) -->
                    <div class="bg-white p-5 rounded-lg shadow-sm border-l-4 border-blue-600 border-t border-r border-b border-gray-200 hover:shadow-md transition duration-200">
                        <p class="text-black whitespace-pre-wrap">{{ snippet.content }}</p>
                        
                        <div class="mt-3 text-xs text-gray-500 font-mono">
                            {{ snippet.created_at|date:"M d, Y - h:i A" }}
                        </div>
                    </div>
                {% empty %}
                    <div class="text-center text-gray-500 py-10 bg-white rounded-lg border-2 border-dashed border-gray-300">
                        Your clipboard is currently empty.
                    </div>
                {% endfor %}
            </div>
        </div>

    </div>
</body>
</html>
